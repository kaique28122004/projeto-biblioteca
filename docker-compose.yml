version: '3.8'

services:

  db-autores:
    image: postgres:15
    container_name: db-autores
    environment:
      POSTGRES_DB: db_autores
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    networks:
      - biblioteca-net

  db-livros:
    image: postgres:15
    container_name: db-livros
    environment:
      POSTGRES_DB: db_livros
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5434:5432"
    networks:
      - biblioteca-net

  autor-ms:
    build: ./autor-ms
    container_name: autor-ms
    ports:
      - "8082:8082"
    depends_on:
      - db-autores
    networks:
      - biblioteca-net

  livro-ms:
    build: ./livro-ms
    container_name: livro-ms
    ports:
      - "8081:8081"
    depends_on:
      - db-livros
    networks:
      - biblioteca-net

  front-ms:
    build: ./front-ms
    container_name: front-ms
    ports:
      - "8080:8080"
    depends_on:
      - autor-ms
      - livro-ms
    networks:
      - biblioteca-net

  nginx:
    image: nginx:1.25
    container_name: nginx-gateway
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - autor-ms
      - livro-ms
      - front-ms
    networks:
      - biblioteca-net

networks:
  biblioteca-net:
    driver: bridge
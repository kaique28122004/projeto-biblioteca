<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Autor</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="container mt-5">

<h2>Cadastro de Autor</h2>

<form
        th:action="${autor.id == null} ? @{/autores/salvar} : @{/autores/atualizar}"
        th:object="${autor}"
        method="post">

    <input type="hidden" th:field="*{id}">

    <div class="mb-3">

        <label>Nome</label>

        <input
                class="form-control"
                th:field="*{nome}">

    </div>

    <div class="mb-3">

        <label>Nacionalidade</label>

        <input
                class="form-control"
                th:field="*{nacionalidade}">

    </div>

    <div class="mb-3">

        <label>Ano de Nascimento</label>

        <input
                type="number"
                class="form-control"
                th:field="*{anoNascimento}">

    </div>

    <button class="btn btn-success">

        Salvar

    </button>

    <a
            th:href="@{/autores}"
            class="btn btn-secondary">

        Cancelar

    </a>

</form>

</body>

</html>

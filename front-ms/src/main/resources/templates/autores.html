<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Autores</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="container mt-5">

<h2>Autores</h2>

<a th:href="@{/autores/novo}"
   class="btn btn-success mb-3">

    Novo Autor

</a>

<table class="table table-bordered">

    <thead>

    <tr>

        <th>ID</th>
        <th>Nome</th>
        <th>Nacionalidade</th>
        <th>Ano</th>
        <th>Ações</th>

    </tr>

    </thead>

    <tbody>

    <tr th:each="autor : ${autores}">

        <td th:text="${autor.id}"></td>

        <td th:text="${autor.nome}"></td>

        <td th:text="${autor.nacionalidade}"></td>

        <td th:text="${autor.anoNascimento}"></td>

        <td>

            <a
                    th:href="@{/autores/editar/{id}(id=${autor.id})}"
                    class="btn btn-warning btn-sm">

                Editar

            </a>

            <a
                    th:href="@{/autores/excluir/{id}(id=${autor.id})}"
                    class="btn btn-danger btn-sm">

                Excluir

            </a>

        </td>

    </tr>

    </tbody>

</table>

<a th:href="@{/}" class="btn btn-secondary">

    Voltar

</a>

</body>

</html>
